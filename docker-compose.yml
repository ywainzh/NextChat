services:
  nextchat:
    container_name: nextchat
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-127.0.0.1:33000}:3000"
    cpus: "1.50"
    mem_limit: 768m
    mem_reservation: 256m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health >/dev/null",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
